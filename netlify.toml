[build]
  command = "npm run build"
  publish = "dist"

# COOP: same-origin — required for SQLite WASM.
# Sin COEP: ffmpeg.wasm usa core single-threaded (0.11.x) que no
# necesita SharedArrayBuffer, así que los iframes de YouTube funcionan.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"

# SPA routing: todas las rutas apuntan a index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
