[build]
  command = "npm run build"
  publish = "dist"

# COOP: same-origin — seguridad cross-window sin bloquear iframes externos
# COEP eliminado: sqlite-wasm usa sqlite3_deserialize con ArrayBuffer normal,
# no necesita SharedArrayBuffer, y COEP bloqueaba los iframes de YouTube.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"

# SPA routing: todas las rutas apuntan a index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
